services:
  deep-researcher:
    build: .
    env_file: .env
    volumes:
      - ./output:/app/output
      - ./research_log.jsonl:/app/research_log.jsonl
    ports:
      - "8001:8001"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import socket; s=socket.create_connection(('localhost',8001),2); s.close()\""]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
